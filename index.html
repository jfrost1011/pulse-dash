<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Pulse Dash</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a1a;touch-action:none;user-select:none;-webkit-user-select:none}
canvas{display:block;width:100%;height:100%}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;font-family:'Segoe UI',system-ui,sans-serif}
#score{position:absolute;top:20px;left:50%;transform:translateX(-50%);color:#fff;font-size:28px;font-weight:700;text-shadow:0 0 20px rgba(0,255,255,.5)}
#combo{position:absolute;top:55px;left:50%;transform:translateX(-50%);color:#ff0;font-size:18px;font-weight:600;opacity:0;transition:opacity .2s}
#level-bar{position:absolute;top:0;left:0;width:100%;height:4px;background:rgba(255,255,255,.1)}
#level-fill{height:100%;width:0%;background:linear-gradient(90deg,#0ff,#f0f);transition:width .3s}
#level-text{position:absolute;top:8px;left:12px;color:rgba(255,255,255,.6);font-size:12px}
#best{position:absolute;top:8px;right:12px;color:rgba(255,255,255,.4);font-size:12px}
#center-msg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:24px;font-weight:700;text-align:center;opacity:0;transition:opacity .3s;text-shadow:0 0 30px rgba(0,255,255,.8)}
#death-msg{position:absolute;top:60%;left:50%;transform:translate(-50%,-50%);color:rgba(255,255,255,.6);font-size:14px;text-align:center;opacity:0;transition:opacity .3s}
#orbs{position:absolute;bottom:20px;left:12px;color:rgba(255,255,255,.5);font-size:14px}
#streak{position:absolute;bottom:20px;right:12px;color:rgba(255,255,255,.5);font-size:14px}
#break-msg{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);color:rgba(255,255,255,.8);padding:8px 16px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .5s;pointer-events:auto;white-space:nowrap}
#theme-unlock{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:20px;font-weight:700;opacity:0;transition:opacity .4s;text-shadow:0 0 40px currentColor}
.visible{opacity:1!important}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
<div id="level-bar"><div id="level-fill"></div></div>
<div id="level-text">LV 1</div>
<div id="best"></div>
<div id="score">0</div>
<div id="combo"></div>
<div id="center-msg">TAP TO DASH</div>
<div id="death-msg"></div>
<div id="orbs">💎 0</div>
<div id="streak"></div>
<div id="break-msg"></div>
<div id="theme-unlock"></div>
</div>
<script>
// ===== AUDIO ENGINE =====
const AudioCtx=window.AudioContext||window.webkitAudioContext;
let actx;
function initAudio(){if(!actx)actx=new AudioCtx()}
function playTone(freq,dur,type='sine',vol=.15){
if(!actx)return;const o=actx.createOscillator(),g=actx.createGain();
o.type=type;o.frequency.value=freq;g.gain.value=vol;
g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+dur);
o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+dur);
}
function sndDash(){playTone(600,.08,'sine',.12);playTone(900,.06,'sine',.08)}
function sndOrb(){playTone(1200,.05,'sine',.1);playTone(1500,.04,'sine',.06)}
function sndNearMiss(){playTone(800,.1,'triangle',.15);playTone(1100,.08,'sine',.1)}
function sndCombo(n){playTone(600+n*100,.12,'sine',.12);playTone(900+n*80,.1,'sine',.08)}
function sndDeath(){playTone(200,.3,'sawtooth',.15);playTone(100,.4,'sawtooth',.1)}
function sndLevelUp(){for(let i=0;i<5;i++)setTimeout(()=>playTone(600+i*150,.15,'sine',.1),i*60)}
function sndGolden(){playTone(1400,.15,'sine',.15);playTone(1800,.12,'sine',.1);playTone(2200,.1,'sine',.08)}
function sndSuper(){for(let i=0;i<8;i++)setTimeout(()=>playTone(400+i*200,.1,'square',.06),i*40)}
function vib(ms){try{navigator.vibrate&&navigator.vibrate(ms)}catch(e){}}

// ===== THEMES =====
const THEMES=[
{name:'Synthwave',bg:'#0a0a1a',player:'#0ff',accent:'#f0f',orb:'#0ff',wall:'#1a1a3a',unlock:0},
{name:'Ocean',bg:'#0a1a2a',player:'#00e5ff',accent:'#0091ea',orb:'#00e5ff',wall:'#0d2137',unlock:5},
{name:'Sunset',bg:'#1a0a0a',player:'#ff6d00',accent:'#ff1744',orb:'#ffab00',wall:'#2a1515',unlock:10},
{name:'Toxic',bg:'#0a1a0a',player:'#76ff03',accent:'#00e676',orb:'#b2ff59',wall:'#1a2a1a',unlock:15},
{name:'Ice',bg:'#0a1a2a',player:'#e0f7fa',accent:'#80deea',orb:'#b2ebf2',wall:'#1a2a3a',unlock:20},
{name:'Lava',bg:'#1a0a00',player:'#ff3d00',accent:'#ff9100',orb:'#ffab00',wall:'#2a1a0a',unlock:25},
{name:'Galaxy',bg:'#0a0020',player:'#e040fb',accent:'#7c4dff',orb:'#ea80fc',wall:'#1a0a30',unlock:30},
{name:'Gold',bg:'#1a1500',player:'#ffd600',accent:'#ffab00',orb:'#fff176',wall:'#2a2510',unlock:40},
{name:'Midnight',bg:'#000010',player:'#304ffe',accent:'#536dfe',orb:'#8c9eff',wall:'#0a0a20',unlock:50},
{name:'Sakura',bg:'#1a0a15',player:'#f48fb1',accent:'#f06292',orb:'#f8bbd0',wall:'#2a1520',unlock:60},
{name:'Void',bg:'#050505',player:'#ffffff',accent:'#9e9e9e',orb:'#e0e0e0',wall:'#151515',unlock:75},
{name:'Prismatic',bg:'#0a0a0a',player:'#fff',accent:'#fff',orb:'#fff',wall:'#1a1a1a',unlock:100,rainbow:true}
];

// ===== GAME STATE =====
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H,LANE_W,LANES=3,playerLane=1,playerX,playerY,playerBaseY;
let obstacles=[],orbs=[],particles=[];
let score=0,combo=0,maxCombo=0,totalOrbs=0,runOrbs=0;
let speed=35,baseSpeed=35,targetSpeed=35;
let playerBoost=0; // upward boost on tap
let xp=0,level=1,xpToNext=100;
let gameState='title'; // title, playing, dead, super
let superTimer=0,superDuration=180; // 3s at 60fps
let deathTimer=0;
let shakeX=0,shakeY=0,shakeAmt=0;
let bestScore=0,dailyStreak=0,totalOrbsAll=0;
let currentTheme=0,unlockedThemes=[0];
let sessionStart=0,breakShown=false;
let successHistory=[],adaptiveDiff=1;
let hue=0; // for rainbow theme
let frameCount=0;
let lastDay='';

// ===== PERSISTENCE =====
function save(){
try{localStorage.setItem('pd',JSON.stringify({
best:bestScore,orbs:totalOrbsAll,level,xp,xpToNext,
theme:currentTheme,unlocked:unlockedThemes,
streak:dailyStreak,lastDay,lastTime:Date.now()
}))}catch(e){}
}
function load(){
try{const d=JSON.parse(localStorage.getItem('pd'));
if(d){bestScore=d.best||0;totalOrbsAll=d.orbs||0;level=d.level||1;xp=d.xp||0;
xpToNext=d.xpToNext||100;currentTheme=d.theme||0;
unlockedThemes=d.unlocked||[0];dailyStreak=d.streak||0;lastDay=d.lastDay||'';
// Welcome back bonus
const away=(Date.now()-(d.lastTime||0))/3600000;
if(away>4){totalOrbsAll+=100;showMsg('Welcome back! +100 💎',2000)}
// Daily streak
const today=new Date().toDateString();
if(lastDay&&lastDay!==today){
const yd=new Date(lastDay);const td=new Date(today);
const diff=(td-yd)/86400000;
if(diff<=2)dailyStreak++;else dailyStreak=1;
}else if(!lastDay)dailyStreak=1;
lastDay=today;
}}catch(e){lastDay=new Date().toDateString();dailyStreak=1}
}

// ===== RESIZE =====
function resize(){
W=canvas.width=window.innerWidth*devicePixelRatio;
H=canvas.height=window.innerHeight*devicePixelRatio;
LANE_W=W/LANES;
playerBaseY=H*0.75;
playerY=playerBaseY;
playerX=LANE_W*playerLane+LANE_W/2;
}
window.addEventListener('resize',resize);

// ===== PARTICLES =====
function addParticles(x,y,color,count,spread=3,life=40){
for(let i=0;i<count;i++){
particles.push({x,y,vx:(Math.random()-.5)*spread*2,vy:(Math.random()-.5)*spread*2,
life,maxLife:life,color,size:Math.random()*4+2});
}}
function addTrail(x,y,color){
particles.push({x,y,vx:(Math.random()-.5)*.5,vy:1+Math.random(),
life:20,maxLife:20,color,size:Math.random()*3+1});
}

// ===== OBSTACLES & ORBS =====
let spawnTimer=0,spawnInterval=80;
function spawnObstacle(){
// Pick a gap lane (or two for easier)
const gaps=adaptiveDiff>1.3?1:adaptiveDiff<0.7?3:2;
const gapLanes=[];
while(gapLanes.length<Math.min(gaps,LANES-1)){
const l=Math.floor(Math.random()*LANES);
if(!gapLanes.includes(l))gapLanes.push(l);
}
const wallH=20+Math.random()*15;
for(let l=0;l<LANES;l++){
if(!gapLanes.includes(l)){
obstacles.push({x:LANE_W*l,y:-wallH,w:LANE_W,h:wallH,lane:l});
}
}
// Orbs in gap lanes
for(const gl of gapLanes){
if(Math.random()<0.7){
const golden=Math.random()<0.05;
orbs.push({x:LANE_W*gl+LANE_W/2,y:-20,r:golden?10:7,golden,collected:false});
}
}
}

// ===== ADAPTIVE DIFFICULTY =====
function updateDifficulty(){
if(successHistory.length<10)return;
const recent=successHistory.slice(-20);
const rate=recent.filter(s=>s).length/recent.length;
if(rate>0.85){adaptiveDiff=Math.min(adaptiveDiff+0.02,2);targetSpeed=baseSpeed*(1+adaptiveDiff*0.3)}
else if(rate<0.6){adaptiveDiff=Math.max(adaptiveDiff-0.03,0.5);targetSpeed=baseSpeed*(1+adaptiveDiff*0.3)}
spawnInterval=Math.max(35,80-adaptiveDiff*20);
}

// ===== INPUT =====
function handleInput(x){
initAudio();
if(gameState==='title'){gameState='playing';sessionStart=Date.now();hideMsg();return}
if(gameState==='dead')return;
const newLane=x<W/2?Math.max(0,playerLane-1):Math.min(LANES-1,playerLane+1);
if(newLane!==playerLane){
playerLane=newLane;
playerBoost=-30; // dash upward on tap
sndDash();vib(10);
addParticles(playerX,playerY,theme().player,5,2,15);
}
}

canvas.addEventListener('touchstart',e=>{e.preventDefault();handleInput(e.touches[0].clientX*devicePixelRatio)},{passive:false});
canvas.addEventListener('mousedown',e=>handleInput(e.clientX*devicePixelRatio));
// Keyboard
document.addEventListener('keydown',e=>{
if(e.key==='ArrowLeft'||e.key==='a')handleInput(0);
else if(e.key==='ArrowRight'||e.key==='d')handleInput(W);
else if(e.key===' ')handleInput(W/2);
});

// ===== HELPERS =====
function theme(){return THEMES[currentTheme]}
function showMsg(t,dur=0){const el=document.getElementById('center-msg');el.textContent=t;el.classList.add('visible');if(dur)setTimeout(()=>el.classList.remove('visible'),dur)}
function hideMsg(){document.getElementById('center-msg').classList.remove('visible')}
function showDeath(t){const el=document.getElementById('death-msg');el.textContent=t;el.classList.add('visible');setTimeout(()=>el.classList.remove('visible'),1500)}

const DEATH_MSGS=['So close!','Almost had it!','The corridor respects you','Neon dreams...','One more?','That was impressive though','Try again!','The light endures'];
const COMBO_MSGS=['','Nice!','Great!','Awesome!','Incredible!','AMAZING!','LEGENDARY!','UNSTOPPABLE!','GODLIKE!','TRANSCENDENT!','∞'];

// ===== GAME LOOP =====
function update(){
frameCount++;
const th=theme();

// Lerp speed
speed+=(targetSpeed-speed)*0.05;

if(gameState==='playing'||gameState==='super'){
// Spawn
spawnTimer++;
if(spawnTimer>=spawnInterval){spawnTimer=0;spawnObstacle()}

// Move obstacles
for(let i=obstacles.length-1;i>=0;i--){
obstacles[i].y+=speed;
if(obstacles[i].y>H+50)obstacles.splice(i,1);
}

// Move orbs
for(let i=orbs.length-1;i>=0;i--){
orbs[i].y+=speed;
if(orbs[i].y>H+50)orbs.splice(i,1);
}

// Player position lerp (horizontal)
const targetX=LANE_W*playerLane+LANE_W/2;
playerX+=(targetX-playerX)*0.55;

// Player vertical movement: dash up on tap, drift back down
playerY+=playerBoost;
playerBoost*=0.9; // decelerate
playerY+=(playerBaseY-playerY)*0.06; // drift back to base
if(playerY>playerBaseY)playerY=playerBaseY;

// Trail (goes downward behind player to show forward motion)
if(frameCount%2===0)addTrail(playerX,playerY+12,th.player);

// Collision with orbs
for(const o of orbs){
if(!o.collected&&Math.abs(o.x-playerX)<25&&Math.abs(o.y-playerY)<25){
o.collected=true;
const val=o.golden?10:1;
runOrbs+=val;totalOrbs+=val;totalOrbsAll+=val;
score+=val*(combo+1)*5;
if(o.golden){sndGolden();addParticles(o.x,o.y,'#ffd600',20,5,50);vib(30);
showMsg('✨ GOLDEN! ✨',800)}
else{sndOrb();addParticles(o.x,o.y,th.orb,8,3,25)}
}
}

// Collision with walls
if(gameState!=='super'){
for(const ob of obstacles){
if(playerX>ob.x+5&&playerX<ob.x+ob.w-5&&playerY>ob.y&&playerY<ob.y+ob.h+15){
// DEATH
gameState='dead';deathTimer=30;
sndDeath();vib([50,30,100]);
addParticles(playerX,playerY,th.player,40,6,60);
shakeAmt=15;
successHistory.push(false);
updateDifficulty();
if(score>bestScore){bestScore=score;showMsg('🏆 NEW BEST! '+score,1500)}
else showDeath(DEATH_MSGS[Math.floor(Math.random()*DEATH_MSGS.length)]);
// XP
const earnedXP=Math.floor(score/10)+combo*2;
xp+=earnedXP;
while(xp>=xpToNext){xp-=xpToNext;level++;xpToNext=Math.floor(xpToNext*1.2);
sndLevelUp();showMsg('⚡ LEVEL '+level+'! ⚡',1200);
// Check theme unlocks
for(let t=0;t<THEMES.length;t++){
if(THEMES[t].unlock<=level&&!unlockedThemes.includes(t)){
unlockedThemes.push(t);currentTheme=t;
setTimeout(()=>{const el=document.getElementById('theme-unlock');
el.textContent='🎨 '+THEMES[t].name+' unlocked!';el.style.color=THEMES[t].player;
el.classList.add('visible');setTimeout(()=>el.classList.remove('visible'),2000)},1300);
}}
}
save();
break;
}
// Near miss detection
if(Math.abs(playerY-(ob.y+ob.h))<20&&playerX>ob.x-10&&playerX<ob.x+ob.w+10){
const nearLane=Math.floor(ob.x/LANE_W);
if(nearLane!==playerLane){
// Near miss!
score+=50*(combo+1);
sndNearMiss();vib(15);
shakeAmt=Math.max(shakeAmt,5);
addParticles(playerX,playerY-10,'#fff',6,2,20);
}
}
}
}

// Super mode
if(gameState==='super'){
superTimer--;
if(superTimer<=0){gameState='playing'}
// Magnet orbs
for(const o of orbs){
if(!o.collected){
const dx=playerX-o.x,dy=playerY-o.y;
const d=Math.sqrt(dx*dx+dy*dy);
if(d<150){o.x+=dx/d*5;o.y+=dy/d*5}
}}
// Extra particles
if(frameCount%3===0)addParticles(playerX+Math.random()*40-20,playerY+Math.random()*40-20,th.accent,2,1,15);
}

// Super mode trigger (2% chance on combo > 3)
if(combo>=3&&Math.random()<0.003&&gameState==='playing'){
gameState='super';superTimer=superDuration;
sndSuper();vib([30,20,30,20,50]);
showMsg('⚡ SUPER DASH! ⚡',1500);
}

// Combo tracking — increase on successful dodges
for(const ob of obstacles){
if(Math.abs(ob.y-playerY)<3&&!ob.passed){
ob.passed=true;
const obLane=Math.floor(ob.x/LANE_W);
if(obLane!==playerLane){
combo++;maxCombo=Math.max(maxCombo,combo);
if(combo>1){sndCombo(combo);
const ci=Math.min(combo,COMBO_MSGS.length-1);
document.getElementById('combo').textContent='x'+combo+' '+COMBO_MSGS[ci];
document.getElementById('combo').classList.add('visible');
}
score+=combo*10;
successHistory.push(true);
updateDifficulty();
}
}
}

// Break reminder
if(!breakShown&&sessionStart&&Date.now()-sessionStart>900000){
breakShown=true;
const el=document.getElementById('break-msg');
el.textContent='☕ 15 min dash! Stretch break?';
el.classList.add('visible');
setTimeout(()=>el.classList.remove('visible'),5000);
}
}

// Dead state
if(gameState==='dead'){
deathTimer--;
if(deathTimer<=0){
// Auto restart
gameState='playing';
score=0;combo=0;runOrbs=0;
playerLane=1;obstacles=[];orbs=[];
speed=baseSpeed;targetSpeed=baseSpeed;
spawnTimer=0;
document.getElementById('combo').classList.remove('visible');
hideMsg();
}
}

// Shake decay
if(shakeAmt>0){shakeX=(Math.random()-.5)*shakeAmt;shakeY=(Math.random()-.5)*shakeAmt;shakeAmt*=0.85;if(shakeAmt<0.5)shakeAmt=0}
else{shakeX=0;shakeY=0}

// Update particles
for(let i=particles.length-1;i>=0;i--){
const p=particles[i];
p.x+=p.vx;p.y+=p.vy;p.life--;
if(p.life<=0)particles.splice(i,1);
}

// Hue for rainbow
hue=(hue+1)%360;
}

// ===== RENDER =====
function draw(){
const th=theme();
ctx.save();
ctx.translate(shakeX,shakeY);

// Background
ctx.fillStyle=th.bg;
ctx.fillRect(-10,-10,W+20,H+20);

// Lane lines
ctx.strokeStyle='rgba(255,255,255,0.04)';
ctx.lineWidth=1;
for(let i=1;i<LANES;i++){
ctx.beginPath();ctx.moveTo(LANE_W*i,0);ctx.lineTo(LANE_W*i,H);ctx.stroke();
}

// Scrolling grid effect
const gridOff=(frameCount*speed*0.5)%40;
ctx.strokeStyle='rgba(255,255,255,0.02)';
for(let y=-40+gridOff;y<H;y+=40){
ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();
}

// Walls
for(const ob of obstacles){
const gradient=ctx.createLinearGradient(ob.x,ob.y,ob.x+ob.w,ob.y+ob.h);
gradient.addColorStop(0,th.wall);
gradient.addColorStop(1,gameState==='super'?th.accent:th.wall);
ctx.fillStyle=gradient;
ctx.fillRect(ob.x+2,ob.y,ob.w-4,ob.h);
// Glow edge
ctx.fillStyle=gameState==='super'?th.accent+'40':th.player+'20';
ctx.fillRect(ob.x+2,ob.y,ob.w-4,2);
}

// Orbs
for(const o of orbs){
if(o.collected)continue;
const glow=o.golden?30:15;
const pulse=Math.sin(frameCount*0.1)*3;
ctx.beginPath();
ctx.arc(o.x,o.y,o.r+pulse,0,Math.PI*2);
ctx.fillStyle=o.golden?'#ffd600':th.orb;
ctx.fill();
ctx.beginPath();
ctx.arc(o.x,o.y,o.r+glow+pulse,0,Math.PI*2);
ctx.fillStyle=(o.golden?'#ffd600':'rgba(0,255,255,')+('0.1)');
ctx.fill();
}

// Particles
for(const p of particles){
const a=p.life/p.maxLife;
ctx.globalAlpha=a;
let c=p.color;
if(th.rainbow)c=`hsl(${(hue+p.x*0.5)%360},100%,70%)`;
ctx.fillStyle=c;
ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size*a,p.size*a);
}
ctx.globalAlpha=1;

// Player
if(gameState!=='dead'){
const px=playerX,py=playerY;
const pr=14;
// Glow
const glowR=gameState==='super'?50:25;
const grad=ctx.createRadialGradient(px,py,pr*0.5,px,py,glowR);
let pColor=th.player;
if(th.rainbow)pColor=`hsl(${hue},100%,70%)`;
if(gameState==='super')pColor=th.accent;
grad.addColorStop(0,pColor);
grad.addColorStop(1,'transparent');
ctx.fillStyle=grad;
ctx.fillRect(px-glowR,py-glowR,glowR*2,glowR*2);
// Core
ctx.beginPath();
ctx.arc(px,py,pr,0,Math.PI*2);
ctx.fillStyle=pColor;
ctx.fill();
// Inner shine
ctx.beginPath();
ctx.arc(px-3,py-3,pr*0.4,0,Math.PI*2);
ctx.fillStyle='rgba(255,255,255,0.4)';
ctx.fill();
}

ctx.restore();

// UI updates
document.getElementById('score').textContent=score;
document.getElementById('level-text').textContent='LV '+level;
document.getElementById('level-fill').style.width=(xp/xpToNext*100)+'%';
document.getElementById('best').textContent='BEST '+bestScore;
document.getElementById('orbs').textContent='💎 '+totalOrbsAll;
document.getElementById('streak').textContent=dailyStreak>0?'🔥 '+dailyStreak:'';
document.body.style.background=th.bg;
}

// ===== MAIN LOOP =====
function loop(){
update();
draw();
requestAnimationFrame(loop);
}

// ===== INIT =====
load();
resize();
document.getElementById('best').textContent='BEST '+bestScore;
document.getElementById('center-msg').classList.add('visible');
if(dailyStreak>1)document.getElementById('streak').textContent='🔥 '+dailyStreak;
loop();
</script>
</body>
</html>
